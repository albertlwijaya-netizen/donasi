{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 bg-gray-50">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h2 class="text-3xl font-bold text-center text-emerald-600 mb-2">CareLink</h2>
        <!-- PERBAIKAN: Mengubah sub-judul agar memperjelas ini halaman login khusus admin -->
        <p class="text-center text-gray-500 mb-6">Panel Masuk Khusus Admin</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Username Admin</label>
                <input type="text" name="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Masukkan username">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">Masuk</button>
        </form>

        <!-- PERBAIKAN: Mengubah link daftar menjadi link kembali ke halaman utama donasi -->
        <p class="mt-4 text-center text-sm text-gray-600">
            Bukan Admin? <a href="{{ url_for('index') }}" class="text-emerald-600 font-semibold hover:underline">Kembali ke Halaman Donasi</a>
        </p>
    </div>
</div>
{% endblock %}
